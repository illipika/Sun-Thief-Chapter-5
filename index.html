<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sun Thief — V</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, cx, cy, R;

// ─── Resize ───────────────────────────────────────────────────────
function resize() {
  W = C.width  = window.innerWidth;
  H = C.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  R  = Math.min(W, H) * 0.40;
  initStars();
  initGrass();
}
window.addEventListener('resize', resize);

// ─── Background stars ─────────────────────────────────────────────
let stars = [];
function initStars() {
  stars = [];
  const n = Math.round(W * H / 5200);
  for (let i = 0; i < n; i++) {
    let x, y, tries = 0;
    do {
      x = Math.random() * W;
      y = Math.random() * H * 0.88;
      tries++;
    } while (Math.hypot(x - cx, y - cy) < R * 1.28 && tries < 25);
    stars.push({
      x, y,
      r:     0.2 + Math.random() * 1.0,
      phase: Math.random() * Math.PI * 2,
      freq:  0.3 + Math.random() * 0.7,
    });
  }
}

// ─── Grass ───────────────────────────────────────────────────────
let grass = [];
function initGrass() {
  grass = [];
  const n = 140;
  for (let i = 0; i < n; i++) {
    grass.push({
      x:     Math.random() * W,
      h:     30 + Math.random() * 100,
      lean:  (Math.random() - 0.5) * 0.75,
      w:     0.7 + Math.random() * 1.4,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// ─── Constellations ───────────────────────────────────────────────
// pts: [r_fraction, local_angle_rad]  polar coords in planisphere space
// lockAt: the rotation value at which this group snaps in
const DEFS = [
  {
    lockAt: 0,
    pts:   [[.22,.42],[.38,.85],[.53,.60],[.36,.19]],
    edges: [[0,1],[1,2],[2,3],[3,0]],
  },
  {
    lockAt: Math.PI / 3,
    pts:   [[.18,2.12],[.34,1.78],[.51,2.30],[.29,2.64]],
    edges: [[0,1],[1,2],[2,3]],
  },
  {
    lockAt: (2 * Math.PI) / 3,
    pts:   [[.58,3.22],[.43,3.64],[.68,3.98],[.50,3.84]],
    edges: [[0,1],[1,3],[3,2],[0,2]],
  },
  {
    lockAt: Math.PI,
    pts:   [[.24,4.52],[.43,4.84],[.56,4.34]],
    edges: [[0,1],[1,2],[0,2]],
  },
  {
    lockAt: (4 * Math.PI) / 3,
    pts:   [[.28,5.80],[.48,5.52],[.62,5.18],[.33,5.04],[.45,5.93]],
    edges: [[0,1],[1,2],[3,4],[4,0],[1,3]],
  },
  {
    lockAt: (5 * Math.PI) / 3,
    pts:   [[.16,.94],[.31,1.14],[.41,.70],[.56,1.06]],
    edges: [[0,1],[1,2],[2,3]],
  },
];

const consts = DEFS.map((d, id) => ({
  ...d, id,
  locked: false,
  glow:   0,   // proximity glow 0-1
  flash:  0,   // post-lock flash 0-1
}));

const THRESH     = 0.16;  // lock threshold (radians ~9°)
const GLOW_ONSET = 0.30;  // glow starts appearing at this distance

// ─── State ───────────────────────────────────────────────────────
let rot       = 0;
let drag      = false;
let dragA0    = 0;   // pointer angle at drag start
let dragR0    = 0;   // rotation at drag start
let prevA     = 0;
let mx        = 0;
let my        = 0;
let imgAlpha  = 0.40;  // increases toward 1 with each lock
let complete  = false;
let compT     = 0;
let frame     = 0;

// ─── Image ───────────────────────────────────────────────────────
const img  = new Image();
img.src    = 'map.jpg.png';
let imgOK  = false;
img.onload = () => { imgOK = true; };

// ─── Math helpers ─────────────────────────────────────────────────
function ptrAngle(x, y) { return Math.atan2(y - cy, x - cx); }

function wrapAngle(d) {
  d = d % (Math.PI * 2);
  if (d >  Math.PI) d -= Math.PI * 2;
  if (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// Polar (planisphere-local) → canvas XY
function p2c(r, theta) {
  const a = theta + rot;
  return [cx + r * R * Math.cos(a), cy + r * R * Math.sin(a)];
}

function getPos(e) {
  return e.touches
    ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
    : { x: e.clientX, y: e.clientY };
}

// ─── Input ───────────────────────────────────────────────────────
function onDown(e) {
  const { x, y } = getPos(e);
  if (Math.hypot(x - cx, y - cy) > R * 1.10) return;
  drag   = true;
  dragA0 = prevA = ptrAngle(x, y);
  dragR0 = rot;
}

function onMove(e) {
  const { x, y } = getPos(e);
  mx = x; my = y;
  if (!drag) return;
  const a     = ptrAngle(x, y);
  const delta = wrapAngle(a - dragA0);
  rot   = dragR0 + delta;
  prevA = a;

  for (const c of consts) {
    if (c.locked) continue;
    const d = Math.abs(wrapAngle(rot - c.lockAt));
    c.glow = d < GLOW_ONSET
      ? Math.pow(1 - d / GLOW_ONSET, 1.6) * (d < THRESH ? 1 : 0.55)
      : 0;
  }
}

function onUp() {
  if (!drag) return;
  drag = false;

  for (const c of consts) {
    if (c.locked) continue;
    if (Math.abs(wrapAngle(rot - c.lockAt)) < THRESH) {
      rot    = c.lockAt;          // snap
      dragR0 = rot;
      c.locked = true;
      c.glow   = 1;
      c.flash  = 1;
      imgAlpha = Math.min(0.92, imgAlpha + 0.10);
      if (consts.every(c => c.locked)) setTimeout(() => { complete = true; }, 700);
      break;
    }
  }
}

C.addEventListener('mousedown',  onDown);
C.addEventListener('mousemove',  onMove);
C.addEventListener('mouseup',    onUp);
C.addEventListener('mouseleave', onUp);
C.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
C.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
C.addEventListener('touchend',   e => { e.preventDefault(); onUp();    });

// ─── Render ───────────────────────────────────────────────────────
function tick() {
  frame++;
  ctx.clearRect(0, 0, W, H);

  // Sky
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  drawBgStars();
  drawPlanisphere();
  drawConstellations();
  drawGrass();
  if (complete) drawEnding();
  drawCursor();

  // Per-frame decay
  for (const c of consts) {
    if (c.flash > 0) c.flash  = Math.max(0, c.flash  - 0.016);
    if (!c.locked && !drag) c.glow = Math.max(0, c.glow - 0.014);
  }

  requestAnimationFrame(tick);
}

// ── Background stars ─────────────────────────────────────────────
function drawBgStars() {
  for (const s of stars) {
    const a = 0.18 + 0.38 * (0.5 + 0.5 * Math.sin(frame * s.freq * 0.012 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,215,200,${a})`;
    ctx.fill();
  }
}

// ── Planisphere disc ─────────────────────────────────────────────
function drawPlanisphere() {
  // --- rotated image, clipped to circle ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.globalAlpha = imgAlpha;

  if (imgOK) {
    // Centre the circular map inside the planisphere disc.
    // The star-map circle lives in the LEFT panel of the image.
    // Approximate its centre and radius in source pixels:
    const srcCx = img.width  * 0.40;   // ~40 % from left edge
    const srcCy = img.height * 0.50;   // vertically centred
    const srcR  = img.height * 0.48;   // radius ≈ 48 % of image height
    const scale = R / srcR;
    ctx.scale(scale, scale);
    ctx.drawImage(img, -srcCx, -srcCy);
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // --- ring border ---
  const progress  = consts.filter(c => c.locked).length / consts.length;
  const nearGlow  = consts.reduce((m, c) => (!c.locked ? Math.max(m, c.glow) : m), 0);
  const ringAlpha = 0.18 + 0.55 * progress + 0.22 * nearGlow;

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${ringAlpha})`;
  ctx.lineWidth   = 1.3;
  ctx.stroke();
}

// ── Constellation overlays ───────────────────────────────────────
function drawConstellations() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.97, 0, Math.PI * 2);
  ctx.clip();

  for (const c of consts) {
    const base  = c.locked ? 0.78 + c.flash * 0.60 : c.glow * 0.65;
    if (base < 0.01) continue;
    const alpha = Math.min(1, base);

    // Lines
    for (const [i, j] of c.edges) {
      const [x1, y1] = p2c(c.pts[i][0], c.pts[i][1]);
      const [x2, y2] = p2c(c.pts[j][0], c.pts[j][1]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.40})`;
      ctx.lineWidth   = 1.0;
      ctx.stroke();
    }

    // Star dots
    for (const [r, theta] of c.pts) {
      const [x, y] = p2c(r, theta);
      const glowR  = c.locked ? 7 : 4;

      const g = ctx.createRadialGradient(x, y, 0, x, y, glowR);
      g.addColorStop(0, `rgba(255,255,255,${alpha})`);
      g.addColorStop(1,  'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(x, y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, c.locked ? 1.8 : 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
  }

  ctx.restore();
}

// ── Grass silhouette ─────────────────────────────────────────────
function drawGrass() {
  const baseY = H * 0.90;
  ctx.lineCap = 'round';

  for (const b of grass) {
    const sway = Math.sin(frame * 0.007 + b.phase) * 5 * Math.abs(b.lean);
    ctx.beginPath();
    ctx.moveTo(b.x, H);
    ctx.quadraticCurveTo(
      b.x + sway * 0.6 + b.lean * 14,
      baseY + b.h * 0.45,
      b.x + sway * 1.6 + b.lean * 24,
      baseY - b.h,
    );
    ctx.strokeStyle = 'rgba(255,255,255,0.52)';
    ctx.lineWidth   = b.w;
    ctx.stroke();
  }
}

// ── Completion: golden pulse from centre ─────────────────────────
function drawEnding() {
  compT = Math.min(1, compT + 0.004);
  const t = compT;

  // Warm radial wash
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 2.4);
  g.addColorStop(0,    `rgba(255,230,120,${t * 0.22})`);
  g.addColorStop(0.45, `rgba(255,175,55,${t * 0.08})`);
  g.addColorStop(1,     'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Centre star (Polaris / the stolen sun)
  const pulse = 0.55 + 0.45 * Math.sin(frame * 0.040);
  const sr    = 22 * t;
  const sg    = ctx.createRadialGradient(cx, cy, 0, cx, cy, sr);
  sg.addColorStop(0,   `rgba(255,252,230,${t * pulse})`);
  sg.addColorStop(0.3, `rgba(255,225,140,${t * pulse * 0.5})`);
  sg.addColorStop(1,    'rgba(255,200,80,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, sr, 0, Math.PI * 2);
  ctx.fillStyle = sg;
  ctx.fill();
}

// ── Custom crosshair cursor ───────────────────────────────────────
function drawCursor() {
  const onDisc = Math.hypot(mx - cx, my - cy) < R;
  const alpha  = onDisc ? 0.90 : 0.48;
  const arm    = onDisc ? 13   : 9;
  const gap    = 4;

  ctx.save();
  ctx.translate(mx, my);
  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth   = 0.9;
  ctx.lineCap     = 'round';

  ctx.beginPath(); ctx.moveTo( gap, 0); ctx.lineTo( arm, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap, 0); ctx.lineTo(-arm, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,  gap); ctx.lineTo(0,  arm); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -gap); ctx.lineTo(0, -arm); ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fill();

  ctx.restore();
}

// ─── Boot ─────────────────────────────────────────────────────────
resize();
tick();
</script>
</body>
</html>
